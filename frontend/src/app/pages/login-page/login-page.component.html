<div class="logo">
  <h1 class="title">Stock'O<br />Frig'O</h1>
  <img src="/imgs/logo.png" alt="Logo stock'o frig'o" />
</div>

<div class="page-content">
  <h2>Connectez-vous</h2>

  <form [formGroup]="loginForm" (ngSubmit)="loginForm.valid && onSubmit()">
    <p-floatlabel variant="in">
      <input
        pInputText
        formControlName="email"
        class="fieldset"
        id="email"
        autocomplete="off"
      />
      <label for="email">Email</label>
    </p-floatlabel>

    <p-floatlabel variant="in" class="input-full-width">
      <p-password
        formControlName="password"
        id="password"
        inputStyleClass="input-full-width"
        [feedback]="false"
      />
      <label for="password">Mot de passe</label>
    </p-floatlabel>

    <p-button
      label="Connexion"
      [disabled]="loginForm.invalid"
      [rounded]="true"
      size="large"
      type="submit"
    />
  </form>

  <p>Vous n'avez pas de compte ? <a routerLink="/register">S'inscrire</a></p>
</div>
<p-toast
  position="bottom-center"
  key="br"
  [breakpoints]="{ '920px': { width: '90%' } }"
>
  <ng-template let-message pTemplate="message">
    <div class="sof-toast" (click)="onToastClose()" role="button" tabindex="0" (keydown.enter)="onToastClose()" (keydown.space)="onToastClose()">
      <button type="button" class="sof-toast-close-btn" (click)="$event.stopPropagation(); onToastClose()" aria-label="Fermer" title="Fermer">
        <i class="pi pi-times"></i>
      </button>
      @if (message.icon) {
        <i [class]="message.icon" class="p-toast-message-icon"></i>
      }
      <div class="sof-toast-text">
        <div class="p-toast-summary">{{ message.summary }}</div>
        <div class="p-toast-detail">{{ message.detail }}</div>
      </div>
    </div>
  </ng-template>
</p-toast>
